# Pod with environment variables defined inline.
# IMP: avoid plain-text secrets in env; use Secret for sensitive values.
apiVersion: v1
kind: Pod
metadata: 
  name: env-nginx-pod
  labels:
    purpose: env-demo
    env: prod
    app.kubernetes.io/name: demo-app
    tier: backend
spec:
  containers:
    - name: nginx-env
      image: nginx
      env:
        - name: RDS_PASSWORD
          value: "password"
       