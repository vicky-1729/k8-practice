# Important: store sensitive values in Secret objects; base64 is not encryption.
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
type: Opaque
data:
  USERNAME: "YWRtaW4="
  PASSWORD: "dGVzdA=="

# Notes
# Secret for sensitive values (base64-encoded data).
# IMP: base64 is encoding, not encryption; protect secret access with RBAC.
# echo -n "word" | base64 
# echo -n "word" | base64 --decode


# Commands:
#   kubectl get secret
#   kubectl describe secret app-secret
