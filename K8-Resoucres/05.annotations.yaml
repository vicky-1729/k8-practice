# Important: pod name must be unique within a namespace.
apiVersion: v1
kind: Pod
metadata: 
  name: annotated-nginx-pod
  labels:
    env: prod
    app.kubernetes.io/name: demo-app
    tier: backend
  annotations:
    description: "Example pod showing how annotations can store operational notes."
spec:
  containers:
  - name: nginx
    image: nginx

# Notes
# Pod annotations hold non-identifying metadata.
# IMP: annotations are for metadata only; they are not used in selectors.


# Commands:
#   kubectl get pods
#   kubectl describe pod annotated-nginx-pod
#   kubectl logs annotated-nginx-pod
