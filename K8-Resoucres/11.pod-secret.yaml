# Important: pod name must be unique within a namespace.
apiVersion: v1
kind: Pod
metadata:
  name: secret-consumer-pod
spec:
  containers:
    - name: nginx
      image: nginx
      envFrom:
        - secretRef:
            name: app-secret

# Notes
# Pod that imports secret values as environment variables.
# IMP: secret updates are not auto-reflected in running env vars; restart pod if needed.


# Commands:
#   kubectl get pods
#   kubectl describe pod secret-consumer-pod
#   kubectl logs secret-consumer-pod
