# Important: pod name must be unique within a namespace.
apiVersion: v1
kind: Pod
metadata:
  name: nginx-sidecar-pod
spec:
  containers:
    - name: catalogue
      image: nginx
    - name: cart
      image: almalinux
      # IMPORTANT: keep this container running for multi-container demo.
      # Keep the helper container alive for demo purposes.
      command: ["sleep","100000"]

# Notes
# Multi-container pod example for sidecar-style workloads.
# IMP: all containers in one pod share the same network and storage context.


# Commands:
#   kubectl get pods
#   kubectl describe pod nginx-sidecar-pod
#   kubectl logs nginx-sidecar-pod
