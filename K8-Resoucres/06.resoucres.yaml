apiVersion: v1
kind: Pod
metadata: 
  name: resource-limited-nginx-pod
  labels:
    env: prod
    app.kubernetes.io/name: demo-app
    tier: backend
spec:
  containers:
  - name: nginx
    image: nginx
    resources:
      # Requests define guaranteed minimum resources.
      requests:
        memory: "64Mi"
        cpu: "250m"
      # Limits define maximum resources this container can consume.
      limits:
        memory: "128Mi"
        cpu: "500m"

# Notes
# Pod with CPU and memory requests/limits.
# IMP: set both requests and limits to avoid resource contention.


# Commands:
#   kubectl get pods
#   kubectl describe pod resource-limited-nginx-pod
#   kubectl logs resource-limited-nginx-pod
