apiVersion: v1
kind: Pod
metadata: 
  name: labeled-nginx-pod
  labels:
    env: prod
    app.kubernetes.io/name: demo-app
    tier: backend
spec:
  containers:
  - name: nginx
    image: nginx

# Notes
# Pod with labels used for selection and grouping.
# IMP: labels are used by selectors (Service/Deployment), so keep them stable.


# Commands:
#   kubectl get pods
#   kubectl describe pod labeled-nginx-pod
#   kubectl logs labeled-nginx-pod
